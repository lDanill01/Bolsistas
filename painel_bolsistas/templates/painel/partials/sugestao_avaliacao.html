<div id="sugestao-ia-container" class="card border-primary mb-4">
    <div class="card-header bg-primary bg-opacity-10 d-flex justify-content-between align-items-center">
        <h6 class="fw-bold text-primary mb-0">
            <i class="bi bi-robot me-2"></i>Sugestão de Avaliação por IA
        </h6>
        <span class="badge bg-primary">Google Gemini</span>
    </div>
    <div class="card-body">
        <p class="mb-3">{{ resumo }}</p>

        <div class="table-responsive">
            <table class="table table-sm table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Critério</th>
                        <th style="width: 100px;">Pontos IA</th>
                        <th>Justificativa</th>
                    </tr>
                </thead>
                <tbody>
                    {% for s in sugestoes %}
                    <tr>
                        <td class="fw-medium">{{ s.criterio_nome }}</td>
                        <td>
                            <span class="badge bg-success fs-6">{{ s.pontos }}</span>
                        </td>
                        <td class="text-muted small">{{ s.justificativa }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
                <tfoot class="table-light">
                    <tr>
                        <th>Total sugerido</th>
                        <th>
                            <span class="badge bg-primary fs-6">{{ total_sugerido }}</span>
                        </th>
                        <th></th>
                    </tr>
                </tfoot>
            </table>
        </div>

        <div class="mt-3 d-flex gap-2">
            <button type="button" class="btn btn-sm btn-primary" onclick="preencherSugestaoIA()">
                <i class="bi bi-magic me-1"></i>Aplicar Sugestão aos Campos
            </button>
            <button type="button" class="btn btn-sm btn-outline-secondary"
                    hx-post="{% url 'painel_sugerir_avaliacao' bolsista.pk %}"
                    hx-target="#sugestao-ia-container"
                    hx-swap="innerHTML"
                    hx-indicator="#ia-indicator-reconsultar">
                <span id="ia-indicator-reconsultar" class="htmx-indicator spinner-border spinner-border-sm me-1"></span>
                <i class="bi bi-arrow-repeat me-1"></i>Reconsultar
            </button>
        </div>
    </div>
</div>

<script>
function preencherSugestaoIA() {
    const sugestoes = {{ sugestoes_json|safe }};
    sugestoes.forEach(function(s) {
        const input = document.querySelector('input[name="criterio_' + s.criterio_id + '"]');
        if (input) {
            input.value = s.pontos.toString().replace('.', ',');
            input.classList.add('border-primary', 'bg-primary', 'bg-opacity-10');
            setTimeout(function() {
                input.classList.remove('border-primary', 'bg-primary', 'bg-opacity-10');
            }, 2000);
        }
    });
}
</script>
