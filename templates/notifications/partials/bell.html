<a href="{% url 'notificacao_list' %}" class="notif-bell text-decoration-none position-relative" title="Notificações"
   hx-get="{% url 'notificacao_unread_count' %}" hx-trigger="every 30s" hx-swap="outerHTML">
    <i class="bi bi-bell-fill"></i>
    {% if unread_count %}
    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
        {{ unread_count }}
        <span class="visually-hidden">notificações não lidas</span>
    </span>
    {% endif %}
</a>
